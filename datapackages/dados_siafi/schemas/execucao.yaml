fields:
  - name: Ano de Exercício
    target: ano

  - name: Mês - Numérico
    target: mes_cod

  - name: Unidade Orçamentária - Código
    target: uo_cod

  - name: Unidade Executora - Código
    target: ue_cod

  - name: Unid Programação Gasto - Código
    target: upg_cod

  - name: Unid Orçam Financiadora Gasto - Cod
    target: uo_fin_cod

  - name: Função - Código
    target: funcao_cod

  - name: Subfunção - Código
    target: subfuncao_cod

  - name: Programa - Código
    target: programa_cod

  - name: Projeto_Atividade - Código
    target: acao_cod

  - name: Grupo Despesa - Código
    target: grupo_cod

  - name: Modalidade Aplicação - Código
    target: modalidade_cod

  - name: Identificador Orçamento - Código
    target: iag_cod

  - name: Fonte Recurso - Código
    target: fonte_cod

  - name: Procedência - Código
    target: ipu_cod

  - name: Elemento Item Despesa - Código
    target: elemento_item_cod

  - name: Elemento origem DEA
    target: elemento_dea_cod

  - name: Item origem DEA
    target: item_dea_cod

  - name: Número Processo Compra SIAD
    target: num_processo_compra

  - name: Licitação - Descrição da Modalidade
    type: string
    title: Licitação - Descrição da Modalidade
    description: |
      Descrição da forma de licitação efetivada de acordo com o SIAFI-MG.
    constraints:
      maxLength: 500
    target: licitacao_modalidade

  - name: CNPJ_CPF Credor - Formatado
    target: cnpj_cpf_formatado

  - name: ContratoConvênio Saída
    target: num_contrato_saida

  - name: ContratoConvênio Entrada
    target: num_contrato_entrada

  - name: Número Obra
    target: num_obra

  - name: Número Empenho
    target: num_empenho

  - name: Valor Despesa Empenhada
    type: number
    title: Valor Despesa Empenhada
    description: |
      Valor líquido, em reais, da despesa empenhada.
    target: vlr_empenhado

  - name: Valor Despesa Liquidada
    type: number
    title: Valor Despesa Liquidada
    description: |
      Valor total da despesa liquidada, em reais.
    target: vlr_liquidado

  - name: Valor Liquidado Retido
    type: number
    title: Valor Liquidado Retido
    description: |
      Valor, em reais, referente às retenções - parte da liquidação a favor de terceiros,
      indicado apenas para análise de um documento de liquidação específico.
    target: vlr_liquidado_retido

  - name: Valor Pago Orçamentário
    type: number
    title: Valor Pago Orçamentário
    description: |
      Valor pago, por empenho.
    constraints:
      minimum: 0
    target: vlr_pago_orcamentario

  - name: Valor Pago Financeiro
    type: number
    title: Valor Pago Financeiro
    description: |
      Valor referente aos pagamentos efetuados através de movimentações bancárias, escriturais e apropriação contábil da despesa.
      Esse cálculo não inclui valor de anulação de despesa paga.
    target: vlr_pago_financeiro
