fields:
  - name: Ano de Exercício
    target: ano

  - name: Poder Unid Orçamentária - Código
    target: poder_cod

  - name: Unidade Orçamentária - Código
    target: uo_cod

  - name: Unidade Executora - Código
    target: ue_cod

  - name: Projeto_Atividade - Código
    target: acao_cod

  - name: Grupo Despesa - Código
    target: grupo_cod

  - name: Modalidade Aplicação - Código
    target: modalidade_cod

  - name: Identificador Orçamento - Código
    target: iag_cod

  - name: Fonte Recurso - Código
    target: fonte_cod

  - name: Procedência - Código
    target: ipu_cod

  - name: Elemento_Item Despesa - Código
    target: elemento_item_cod

  - name: Data Registro Doc CotaAprov
    type: datetime
    title: Data Registro Documento Aprovação Cota
    description: |
      Data completa de registro do documento de aprovação de cota orçamentária.
    constraints:
      minimum: '2002/01/01 00:00:00'
    format: '%Y/%m/%d %H:%M:%S'
    target: data_registro_cota

  - name: Operador - Registro
    type: string
    title: Operador - Registro
    description: |
      Operador de registro da aprovação de cota no SIAFI-MG.
    constraints:
      pattern: '^[A-Z0-9]{7,8}$'
    target: operador_registro

  - name: Operador - Cancelamento
    type: string
    title: Operador - Cancelamento
    description: |
      Operador de cancelamento da aprovação de cota no SIAFI-MG.
    constraints:
      pattern: '^[A-Z0-9]{7,8}$'
    target: operador_cancelamento

  - name: Documento Aprovação Cota
    type: string
    title: Documento Aprovação Cota
    description: |
      Número do documento de aprovação da cota orçamentária.
    constraints:
      pattern: '^[1-9]\d{0,4}$'
    target: documento_aprovacao_cota

  - name: Valor Cota Aprovada
    type: number
    title: Valor Cota Aprovada
    description: |
      Valor, em reais, da cota aprovada.
    constraints:
      minimum: 0
    target: vlr_cota_aprovada

  - name: Valor Cota Cancelada
    type: number
    title: Valor Cota Cancelada
    description: |
      Valor, em reais, da cota aprovada cancelada.
    constraints:
      minimum: 0
    target: vlr_cota_cancelada

  - name: Valor Anulação Cota Aprovada
    type: number
    title: Valor Anulação Cota Aprovada
    description: |
      Valor anulado da cota aprovada, em reais.
    constraints:
      minimum: 0
    target: vlr_cota_anulada

  - name: Valor Cota Aprovada Líquida
    type: number
    title: Valor Cota Aprovada Líquida
    description: |
      Valor líquido, em reais, da cota aprovada.
    target: vlr_cota_aprovada_liquida
